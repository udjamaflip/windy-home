---
name: Bug report
description: Report a bug with the Windy Home integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Integration version
      description: "Found in Settings → Devices & Services → Windy Home"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2024.12.0"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "Paste logs from Settings → System → Logs (filter by `windy`)"
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, config details, etc.
